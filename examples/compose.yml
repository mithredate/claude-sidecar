# Claude Sidecar - single-container integration example
# ======================================================
# Drop this into a project (adjust paths) and run: docker compose up -d
#
# Model:
# - Claude Code runs in one container with toolchains (mise) installed in-image.
# - The project tree is mounted at its REAL host path so Claude's per-project MCP
#   config + history (keyed by absolute path) match inside the container.
# - Claude reaches your app services (db, redis, ...) over this compose network by
#   service name - no Docker socket, no command bridge.
# - A startup firewall whitelists egress; Claude runs as a non-root user.

services:
  claude:
    image: ghcr.io/mithredate/claude-sidecar:latest
    # Or build locally:
    # build: ./path/to/claude-sidecar
    container_name: claude
    stdin_open: true
    tty: true
    # Required for the egress firewall (iptables/ipset)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - SIDECAR_CONFIG_DIR=${HOME}/projects/myapp/.sidecar
      - MISE_TRUSTED_CONFIG_PATHS=${HOME}/projects
      # On Linux, match the host user so mounted files are owned correctly:
      # - PUID=1000
      # - PGID=1000
      # Give Claude the connection info its app code needs (deferred credential
      # isolation: the brain holds these for now):
      # - DATABASE_URL=postgres://myapp:secret@db:5432/myapp
    volumes:
      # Mount the projects tree at the REAL host path (source == target).
      - ${HOME}/projects:${HOME}/projects
      # Persistent Claude home: auth, config, and installed toolchains survive recreation.
      - claude-home:/home/claude
      # Read-only seeds (copied into the volume on first start only). See README.
      - ./.credentials.json:/seed/credentials.json:ro
      - ${HOME}/.claude.json:/seed/claude.json:ro
      # Mask this project's secret files from the model.
      - /dev/null:${HOME}/projects/myapp/.env
      - /dev/null:${HOME}/projects/myapp/.credentials.json
    working_dir: ${HOME}/projects/myapp

  # ===========================================
  # Your application services go here. Claude reaches them by name over this
  # network (e.g. db:5432). Example:
  # ===========================================
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: myapp
  #     POSTGRES_USER: myapp
  #     POSTGRES_PASSWORD: secret
  #   volumes:
  #     - db-data:/var/lib/postgresql/data

volumes:
  claude-home:
  # db-data:
