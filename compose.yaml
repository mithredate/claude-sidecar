# Docker Compose v2 configuration for claude-sidecar
# =====================================================
# Single-container model:
#   claude: Claude Code + project toolchains (mise). Runs build/test directly
#   and reaches project services (db, redis, ...) over the compose network.
#
# There is no command bridge or Docker socket proxy: Claude no longer execs into
# sibling containers, so it does not need Docker access at all.
#
# Usage:
#   docker compose up -d                                # Start
#   docker compose exec claude claude                   # Run Claude interactively
#   docker compose exec -e CLAUDE_YOLO=1 claude claude  # Run Claude in YOLO mode

services:
  # Main Claude Code container
  claude:
    build:
      context: .
      dockerfile: Dockerfile
      # Configure user UID/GID for file ownership compatibility with host:
      # - Default: 501 (macOS default UID/GID)
      # - For Linux: Override with CLAUDE_UID=1000 and CLAUDE_GID=1000
      # Usage: docker compose build --build-arg CLAUDE_UID=1000 --build-arg CLAUDE_GID=1000
      args:
        CLAUDE_UID: ${CLAUDE_UID:-501}
        CLAUDE_GID: ${CLAUDE_GID:-501}
    container_name: claude-sidecar-claude
    stdin_open: true
    tty: true
    # Required capabilities for firewall initialization (iptables/ipset)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      # Base directory for claude-sidecar config files (allowed-domains.txt)
      # Used by the firewall script
      - SIDECAR_CONFIG_DIR=${HOME}/projects/claude-sidecar/.sidecar
      # Auto-trust mise configs (mise.toml/.tool-versions) anywhere under the
      # projects tree, so per-project toolchain pins work without manual `mise trust`.
      - MISE_TRUSTED_CONFIG_PATHS=${HOME}/projects
    volumes:
      # Mount the whole projects tree at its REAL host path. Mounting at the identical
      # absolute path means Claude's per-project MCP config and session history
      # (keyed by absolute path in ~/.claude.json) match inside the container.
      # ${HOME} interpolates on the host, so source==target and it stays portable.
      # NOTE: this exposes every sibling repo (and their .env files) to the model.
      - ${HOME}/projects:${HOME}/projects
      # Persistent per-container Claude home. Auth + config survive container
      # recreation (no re-auth / re-onboarding), and are NOT shared live with the
      # host (no concurrent-write/daemon-lock hazard, no shared session history).
      - claude-home:/home/claude
      # Read-only SEED mounts. The entrypoint copies these into the volume on first
      # start only. Read-only file binds, so the atomic-save/inode gotcha is moot and
      # there is no host-bind-inside-host-bind nesting (which fails on macOS virtiofs).
      #   credentials.json: FULL keychain blob (claudeAiOauth + mcpOAuth) so MCP auth works
      #   claude.json:      global config (hasCompletedOnboarding, oauthAccount, mcpServers)
      - ./.credentials.json:/seed/credentials.json:ro
      - ${HOME}/.claude.json:/seed/claude.json:ro
      # Mask THIS repo's secret files - critically .credentials.json holds the full
      # keychain blob (all MCP tokens) and now lives inside the mounted projects tree.
      - /dev/null:${HOME}/projects/claude-sidecar/.env
      - /dev/null:${HOME}/projects/claude-sidecar/.credentials.json
    working_dir: ${HOME}/projects/claude-sidecar

# Named volumes for persistent storage
volumes:
  # Per-container Claude home: auth + config persist across recreation
  claude-home:
