# Docker Compose v2 configuration for claude-sidecar
# =====================================================
# Two profiles:
#   - default (isolated): claude service uses bridge network with firewall on.
#     OAuth callbacks on random ports do NOT work in this mode (known limitation).
#   - "host-network" profile: claude-host uses host network, firewall off.
#     Works out-of-the-box for OAuth callbacks / MCP SSO.
#
# Usage:
#   docker compose up -d                                  # Isolated (default)
#   docker compose --profile host-network up -d           # Host-network mode
#   docker compose exec claude claude                     # Run Claude (isolated)
#   docker compose exec claude-host claude                # Run Claude (host-network)
#   docker compose exec -e CLAUDE_YOLO=1 claude claude
#
# Prerequisite: create .credentials.json before first `up`. See scripts/sync-creds.sh
# (sync-creds.sh also creates the shared `claude-sidecar-home` volume if missing.)
#
# Do not run both profiles simultaneously: they share the .credentials.json
# bind-mount and the claude-home volume.
#
# The `claude-home` volume is declared external with a fixed name so it is
# SHARED across every project that uses claude-sidecar. One login, one set of
# plugins, one MCP/marketplace config, available in every project's container.
# `docker compose down -v` will NOT delete it (external volumes are
# Compose-untouchable) — remove it explicitly with
# `docker volume rm claude-sidecar-home` if you want to start over.

# Shared config for both claude variants
x-claude-common: &claude-common
  # Shared image tag so both `claude` and `claude-host` use the same build
  # output. Without this, compose tags one image per service and a single
  # `docker compose build` only refreshes one of them.
  image: claude-sidecar:latest
  build:
    context: .
    dockerfile: Dockerfile
    args:
      CLAUDE_UID: ${CLAUDE_UID:-501}
      CLAUDE_GID: ${CLAUDE_GID:-501}
  stdin_open: true
  tty: true
  environment: &claude-common-env
    SIDECAR_CONFIG_DIR: /workspaces/claude-sidecar/.sidecar
  volumes: &claude-common-volumes
    - .:/workspaces/claude-sidecar
    # Whole home dir is persisted so both ~/.claude/ and ~/.claude.json stick
    # across container recreates (onboarding state, MCP config, settings).
    - claude-home:/home/claude
    # Credentials are bind-mounted to a SEED location, not the live path.
    # Single-file bind mounts lock the destination inode against rename(),
    # which breaks Claude's atomic write when refreshing tokens or completing
    # MCP OAuth (DCR). The entrypoint promotes seed → volume on first start,
    # and sync-creds.sh pushes updates into running containers via docker cp.
    - ./.credentials.json:/run/seed/.credentials.json:ro
    - /dev/null:/workspaces/claude-sidecar/.env
    - /dev/null:/workspaces/claude-sidecar/.credentials.json
  working_dir: /workspaces/claude-sidecar

services:
  # Docker socket proxy: restricts Docker API to an allowed subset.
  # Also published on host loopback so the host-network claude-host service
  # can reach it (service-name DNS doesn't resolve in host netns).
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: claude-sidecar-socket-proxy
    environment:
      - CONTAINERS=1
      - EXEC=1
      - POST=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - BUILD=1
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - PLUGINS=0
      - SECRETS=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
    ports:
      # Loopback-only publish so the host-network claude-host can reach it at 127.0.0.1:12375
      - "127.0.0.1:12375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Default: bridge network with firewall and compose-DNS socket-proxy.
  # OAuth callback ports on random high ports don't work here (known limitation).
  claude:
    <<: *claude-common
    container_name: claude-sidecar-claude
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      <<: *claude-common-env
      ENABLE_FIREWALL: "1"
      DOCKER_HOST: tcp://socket-proxy:2375
    depends_on:
      - socket-proxy
      - golang

  # Host-network: shares host netns, firewall off. OAuth callbacks work.
  # Opt-in via --profile host-network.
  claude-host:
    <<: *claude-common
    container_name: claude-sidecar-claude-host
    profiles: ["host-network"]
    network_mode: host
    environment:
      <<: *claude-common-env
      # Firewall off: in host netns, iptables rules would mutate the HOST's
      # chains and blackhole the user's outbound traffic. Must stay 0.
      ENABLE_FIREWALL: "0"
      # Reach socket-proxy via published loopback port (no compose DNS in host netns)
      DOCKER_HOST: tcp://127.0.0.1:12375
    depends_on:
      - socket-proxy
      - golang

  # Go sidecar container for running go commands (used by both profiles)
  golang:
    image: golang:1.24-alpine
    container_name: claude-sidecar-golang
    command: ["sleep", "infinity"]
    volumes:
      - .:/workspaces/claude-sidecar
    working_dir: /workspaces/claude-sidecar

volumes:
  # SHARED across every project. Persists /home/claude (auth, plugins,
  # marketplaces, .claude.json, MCP state, settings, session history).
  # `external: true` + a fixed `name:` means every compose project that
  # references this volume resolves to the same backing volume, instead of
  # the default `<project>_claude-home` per-project naming.
  # Created on demand by scripts/sync-creds.sh (or `docker volume create
  # claude-sidecar-home`).
  claude-home:
    name: claude-sidecar-home
    external: true
